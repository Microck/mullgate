name: Publish to npm

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to publish from, e.g. v0.1.1
        required: true
        type: string

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - id: check-publish-flag
        name: Check publish flag
        env:
          NPM_PUBLISH_ENABLED: ${{ secrets.NPM_PUBLISH_ENABLED }}
        run: |
          if [[ "$NPM_PUBLISH_ENABLED" != "true" ]]; then
            echo "NPM_PUBLISH_ENABLED not set to true — skipping"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ steps.check-publish-flag.outputs.enabled == 'true' }}
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.release_tag) || github.event.workflow_run.head_sha }}

      - name: Install pnpm
        if: ${{ steps.check-publish-flag.outputs.enabled == 'true' }}
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.18.3

      - name: Setup Node.js
        if: ${{ steps.check-publish-flag.outputs.enabled == 'true' }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        if: ${{ steps.check-publish-flag.outputs.enabled == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: ${{ steps.check-publish-flag.outputs.enabled == 'true' }}
        run: pnpm lint

      - name: Typecheck
        if: ${{ steps.check-publish-flag.outputs.enabled == 'true' }}
        run: pnpm typecheck

      - name: Test
        if: ${{ steps.check-publish-flag.outputs.enabled == 'true' }}
        run: pnpm test -- --run

      - name: Build
        if: ${{ steps.check-publish-flag.outputs.enabled == 'true' }}
        run: pnpm build

      - name: Verify package metadata
        if: ${{ steps.check-publish-flag.outputs.enabled == 'true' }}
        run: npm pack --dry-run

      - name: Publish package
        if: ${{ steps.check-publish-flag.outputs.enabled == 'true' }}
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
