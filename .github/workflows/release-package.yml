name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: tag to release, e.g. v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test --run

      - id: tag
        name: Determine tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - id: notes
        name: Extract release notes from CHANGELOG
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          VERSION_REGEX="$(printf '%s\n' "$VERSION" | sed 's/[][(){}.+*?^$|\\]/\\&/g')"
          NOTES="$(awk -v version="$VERSION_REGEX" '
            $0 ~ "^##[[:space:]]+\\[?" version "\\]?([[:space:]]+-.*)?$" { capture=1; next }
            capture && /^##[[:space:]]+/ { exit }
            capture { print }
          ' CHANGELOG.md)"
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Pack release tarball
        run: |
          pnpm pack
          TARFILE="$(ls -t ./*.tgz | head -n 1)"
          mv "$TARFILE" "mullgate-${{ steps.tag.outputs.tag }}.tgz"

      - name: Generate checksums
        run: sha256sum "mullgate-${{ steps.tag.outputs.tag }}.tgz" > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: mullgate (${{ steps.tag.outputs.tag }})
          body: ${{ steps.notes.outputs.notes }}
          files: |
            mullgate-${{ steps.tag.outputs.tag }}.tgz
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
